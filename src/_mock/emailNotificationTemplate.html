<!DOCTYPE html>
<html>

<head>
    <title>Reset Password</title>
    <link href='https://fonts.googleapis.com/css?family=Public Sans' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            font-family: 'Public Sans';
            text-align: center;
        }
        a {
            color: #3399FF
        }
        a.button {
            -webkit-appearance: button;
            -moz-appearance: button;
            appearance: button;
            background-color: #3399FF;
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            color: black;
            margin: 8px;
            width: 100%;
            margin: 5%;
        }
        a.accept {
            -webkit-appearance: button;
            -moz-appearance: button;
            appearance: button;
            background-color: green;
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            color: black;
            margin: 8px;
            width: 100%;
            margin: 5%;
        }
        a.reject {
            -webkit-appearance: button;
            -moz-appearance: button;
            appearance: button;
            background-color: red;
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            color: black;
            margin: 8px;
            width: 100%;
            margin: 5%;
        }
        a.info {
            -webkit-appearance: button;
            -moz-appearance: button;
            appearance: button;
            border-color: orange;
            border-style: solid;
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            color: orange;
            margin: 8px;
            width: 100%;
            margin: 5%;
        }
        #title {
            font-style: bold;

        }
        .button-container {
            margin-top: 40px;
            align-items: center;
        }
        .info-container {
            margin-top: 50px;
        }
        .logo-img {
            width: 100%;
        }
        .user-info-container {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            text-align: left;
            align-items: center;
            padding: 8px;
            margin-bottom: 8px;
            border-color: #3399FF;
            border-style: solid;
            border-radius: 8px;
            margin-right: 40px;
            margin-left: 40px;
            margin-bottom: 20px;
        }
        .user-data {
            padding: 5px;
            margin: 3px;
        }
        .more-info-button-container {
            padding-left: 5px;
        }
        .card-logo {
            width: 80px;
        }
        .card-logo-container {
            position: relative;
            top: -50px
        }
    </style>
</head>

<body>
    <center>
        <div>
            <img class='logo-img' src='https://i.imgur.com/iFa4ZBT.png' />
        </div>
        <p>New match! Tomas wants to connect and take a lesson with you.</p>
        <div class="user-info-container">
            <div class='user-data'>
                <h4>Tomas Bacigalupo</h4>
                <ul>
                    <li>24</li>
                    <li>Privada 2 personas</li>
                    <li>Intermedio</li>
                    <li>Media Mañana</li>
                </ul>
            </div>
            <div>
                <div class='card-logo-container'>
                    <img class="card-logo" src='https://i.imgur.com/Kwiempv.png' />
                </div>
            </div>
        </div>
        <div class='button-container'>
            <a href="https://google.com" class="info">MORE INFO</a>
        </div>
        <div class='button-container'>
            <a href="https://google.com" class="reject">REJECT</a>
            <a href="https://google.com" class="accept">ACCEPT</a>
        </div>
        <div class='info-container'>
            <p>If this email is an error please contact our support team <a href="office@snowmatch.pro">office@snowmatch.pro</a> </p>
        </div>
    </center>
</body>

</html>
